validation_rule:
  intent: collect_zabbix_host_availability_summary_readonly
  steps:
    - type: require_mapping
      key: zabbix_host_availability_summary
      fail:
        rule: collect_zabbix_host_availability_summary_readonly.result_required
        details: {reason: missing normalized Zabbix host availability summary}
    - type: require_equals
      path: zabbix_host_availability_summary.complete
      value: true
      pass_rule: collect_zabbix_host_availability_summary_readonly.complete
      fail_rule: collect_zabbix_host_availability_summary_readonly.incomplete
      details_from: zabbix_host_availability_summary
