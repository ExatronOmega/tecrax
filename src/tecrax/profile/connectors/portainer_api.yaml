connector:
  name: portainer_api
  backend: http_api
  capabilities:
    - read_portainer_status
  action_shapes:
    read_portainer_status:
      method: GET
      path: /api/status
      unwrap: Version
      mutating: false
      max_response_bytes: 1024
  modes:
    - read_only
    - dry_run
  timeout_default: 10s
