workflow:
  id: tecrax.configure_chrony_ntp_server
  intent: configure_chrony_ntp_server
  mode: apply
  risk: medium
  description: Apply a single bounded chrony NTP server configuration after admission.
  steps:
    - id: pre_chrony_ntp_state
      type: connector
      connector: chrony_ntp_server
      action: read_chrony_ntp_server_state
      pause_safe: true
    - id: apply_chrony_ntp_server
      type: connector
      connector: chrony_ntp_server
      action: apply_chrony_ntp_server
      pause_safe: false
    - id: post_chrony_ntp_state
      type: connector
      connector: chrony_ntp_server
      action: read_chrony_ntp_server_state
      pause_safe: true
    - id: produce_receipt
      type: evidence
      action: produce_receipt
      pause_safe: true
  retry:
    max_attempts: 1
    allowed_on: []
    blocked_on: [policy_denied, validation_failed]
  rollback:
    mode: recovery
    steps:
      - id: rollback_chrony_ntp_server
        type: connector
        connector: chrony_ntp_server
        action: rollback_chrony_ntp_server
        pause_safe: false
