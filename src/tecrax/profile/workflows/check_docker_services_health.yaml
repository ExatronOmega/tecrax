workflow:
  id: tecrax.check_docker_services_health
  intent: check_docker_services_health
  mode: read_only
  risk: low
  description: Check bounded Docker systemd service/socket state without Docker socket access.

  steps:
    - id: read_docker_service_state
      type: connector
      connector: monitoring_host
      action: read_docker_service_state
      timeout: 10s
      pause_safe: true
    - id: read_docker_socket_state
      type: connector
      connector: monitoring_host
      action: read_docker_socket_state
      timeout: 10s
      pause_safe: true
      metadata: {continue_on_error: true}
    - id: normalize_docker_services_health
      type: internal
      action: normalize_docker_services_health
      pause_safe: true
    - id: produce_receipt
      type: evidence
      action: produce_receipt
      pause_safe: true

  retry:
    max_attempts: 1
    allowed_on: [timeout, transient_connector_error]
    blocked_on: [policy_denied]
