workflow:
  id: tecrax.collect_zabbix_problem_summary_readonly
  intent: collect_zabbix_problem_summary_readonly
  mode: read_only
  risk: low
  description: Collect bounded Zabbix open problem counts by severity.

  steps:
    - {id: read_zabbix_problem_count_not_classified, type: connector, connector: zabbix_api_authenticated, action: read_zabbix_problem_count_not_classified, timeout: 10s, pause_safe: true}
    - {id: read_zabbix_problem_count_information, type: connector, connector: zabbix_api_authenticated, action: read_zabbix_problem_count_information, timeout: 10s, pause_safe: true}
    - {id: read_zabbix_problem_count_warning, type: connector, connector: zabbix_api_authenticated, action: read_zabbix_problem_count_warning, timeout: 10s, pause_safe: true}
    - {id: read_zabbix_problem_count_average, type: connector, connector: zabbix_api_authenticated, action: read_zabbix_problem_count_average, timeout: 10s, pause_safe: true}
    - {id: read_zabbix_problem_count_high, type: connector, connector: zabbix_api_authenticated, action: read_zabbix_problem_count_high, timeout: 10s, pause_safe: true}
    - {id: read_zabbix_problem_count_disaster, type: connector, connector: zabbix_api_authenticated, action: read_zabbix_problem_count_disaster, timeout: 10s, pause_safe: true}
    - id: normalize_zabbix_problem_summary
      type: internal
      action: normalize_zabbix_problem_summary
      pause_safe: true
    - id: produce_receipt
      type: evidence
      action: produce_receipt
      pause_safe: true

  retry:
    max_attempts: 1
    allowed_on: [timeout, transient_connector_error]
    blocked_on: [policy_denied]
