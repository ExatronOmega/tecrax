name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v6
      - name: Resolve stack refs
        run: |
          case "${GITHUB_REF_NAME}" in
            v0.3.5a0)
              {
                echo "REXECOP_REF=v0.2.6a0"
                echo "GOVENGINE_REF=v0.16.0"
                echo "SCLITE_REF=v1.0.4"
              } >> "$GITHUB_ENV"
              ;;
            v0.3.6a0)
              {
                echo "REXECOP_REF=v0.2.7a0"
                echo "GOVENGINE_REF=v0.16.1"
                echo "SCLITE_REF=v1.0.5"
              } >> "$GITHUB_ENV"
              ;;
            v0.3.7a0)
              {
                echo "REXECOP_REF=v0.2.9a0"
                echo "GOVENGINE_REF=v0.16.2"
                echo "SCLITE_REF=v1.0.6"
              } >> "$GITHUB_ENV"
              ;;
            *)
              {
                echo "REXECOP_REF=main"
                echo "GOVENGINE_REF=main"
                echo "SCLITE_REF=main"
              } >> "$GITHUB_ENV"
              ;;
          esac
      - name: Check out RExecOP
        run: git clone --depth 1 --branch "$REXECOP_REF" https://github.com/rozmiarD/RExecOP.git ci-deps/rexecop
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install source dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "sclite-core @ git+https://github.com/rozmiarD/SCLite.git@${SCLITE_REF}"
          python -m pip install "govengine @ git+https://github.com/rozmiarD/GovEngine.git@${GOVENGINE_REF}"
          python -m pip install -e ./ci-deps/rexecop
          python -m pip install -e '.[dev]'
      - name: Validate public truth
        run: |
          python scripts/validate_public_truth.py
          python scripts/validate_active_profile.py
          python scripts/validate_secret_topology.py
      - name: Ruff
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy src/tecrax
      - name: Run tests
        run: python -m pytest -q

  package-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Resolve stack refs
        run: |
          case "${GITHUB_REF_NAME}" in
            v0.3.5a0)
              {
                echo "REXECOP_REF=v0.2.6a0"
                echo "GOVENGINE_REF=v0.16.0"
                echo "SCLITE_REF=v1.0.4"
              } >> "$GITHUB_ENV"
              ;;
            v0.3.6a0)
              {
                echo "REXECOP_REF=v0.2.7a0"
                echo "GOVENGINE_REF=v0.16.1"
                echo "SCLITE_REF=v1.0.5"
              } >> "$GITHUB_ENV"
              ;;
            v0.3.7a0)
              {
                echo "REXECOP_REF=v0.2.9a0"
                echo "GOVENGINE_REF=v0.16.2"
                echo "SCLITE_REF=v1.0.6"
              } >> "$GITHUB_ENV"
              ;;
            *)
              {
                echo "REXECOP_REF=main"
                echo "GOVENGINE_REF=main"
                echo "SCLITE_REF=main"
              } >> "$GITHUB_ENV"
              ;;
          esac
      - name: Check out RExecOP
        run: git clone --depth 1 --branch "$REXECOP_REF" https://github.com/rozmiarD/RExecOP.git ci-deps/rexecop
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install source dependencies and build tooling
        run: |
          python -m pip install --upgrade pip build twine
          python -m pip install "sclite-core @ git+https://github.com/rozmiarD/SCLite.git@${SCLITE_REF}"
          python -m pip install "govengine @ git+https://github.com/rozmiarD/GovEngine.git@${GOVENGINE_REF}"
      - name: Clean build artifacts
        run: rm -rf dist build *.egg-info
      - name: Build package
        run: python -m build
      - name: Check package metadata
        run: python -m twine check dist/*
      - name: Wheel install smoke
        run: |
          python -m venv /tmp/tecrax-wheel-smoke
          /tmp/tecrax-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/tecrax-wheel-smoke/bin/python -m pip install "sclite-core @ git+https://github.com/rozmiarD/SCLite.git@${SCLITE_REF}"
          /tmp/tecrax-wheel-smoke/bin/python -m pip install "govengine @ git+https://github.com/rozmiarD/GovEngine.git@${GOVENGINE_REF}"
          /tmp/tecrax-wheel-smoke/bin/python -m pip install -e ./ci-deps/rexecop
          /tmp/tecrax-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/tecrax-wheel-smoke/bin/python -m pip check
          /tmp/tecrax-wheel-smoke/bin/python -c "import importlib.metadata as md, tecrax; assert md.version('tecrax') == tecrax.__version__"
